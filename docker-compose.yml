services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pecuaria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-pecuaria}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pecuaria}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-pecuaria}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pecuaria}
      JWT_SECRET: ${JWT_SECRET}
      IA_SERVICE_URL: ${IA_SERVICE_URL:-http://localhost:8000}
    ports:
      - "0.0.0.0:3001:3001"

volumes:
  postgres_data:
